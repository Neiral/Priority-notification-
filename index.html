<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Priority Notification</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      background: linear-gradient(-45deg, #1a0f1f, #2c003e, #3a0d2d, #0d1b3a);
      background-size: 400% 400%;
      animation: gradientShift 20s ease infinite;
      font-family: "Segoe UI", sans-serif;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .heart {
      position: absolute;
      font-size: 80px;
      color: rgba(255, 100, 150, 0.25);
      pointer-events: none;
      animation: floatUp linear forwards;
    }

    @keyframes floatUp {
      0%   { transform: translateY(110vh) translateX(0); opacity: 0; }
      10%  { opacity: 0.5; }
      50%  { opacity: 0.35; }
      90%  { opacity: 0.5; }
      100% { transform: translateY(-120vh) translateX(var(--x-move)); opacity: 0; }
    }

    .container {
      position: relative;
      z-index: 2;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      max-width: 400px;
      color: #fff;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 26px;
    }

    p {
      margin-bottom: 30px;
      opacity: 0.9;
    }

    button {
      background: linear-gradient(135deg, #ff5fa2, #ff2466);
      border: none;
      border-radius: 50px;
      padding: 15px 40px;
      color: white;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(255, 36, 102, 0.5);
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.07);
    }
  </style>
</head>

<body>

<div class="container">
  <h1>✨ You Are My Priority ✨</h1>
  <p>Press the button below to notify me — I’ll reach you as soon as possible.</p>
  <button onclick="sendNotification()">Notify Me</button>
</div>

<script>
  // Floating hearts
  function spawnHeart() {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.textContent = "❤";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.setProperty("--x-move", (Math.random() * 60 - 30) + "px");
    heart.style.fontSize = (Math.random() * 30 + 70) + "px";
    const duration = Math.random() * 8 + 10;
    heart.style.animationDuration = duration + "s";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), duration * 1000);
  }

  setInterval(spawnHeart, 1500);
  for (let i = 0; i < 6; i++) spawnHeart();

  // Telegram Notification
  async function sendNotification() {
    const token = "8568542100:AAFpUQ2U-lKLDge9djSK5LgsyvlKcT8ZEq8";
    const chatId = "8552546080";

    try {
      const res = await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          chat_id: chatId,
          text: `🚨 Priority Alert!\nSomeone clicked the button.\nTime: ${new Date().toLocaleString()}`
        })
      });

      const data = await res.json();

      if (data.ok) {
        alert("✅ Notification sent!");
      } else {
        alert("⚠️ " + data.description);
      }

    } catch (err) {
      alert("❌ Network error");
    }
  }
</script>

</body>
</html>
